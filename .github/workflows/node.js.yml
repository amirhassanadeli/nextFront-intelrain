name: Deploy Next.js

on:
push:
branches:
- main

jobs:
deploy:
runs-on: ubuntu-latest

```
steps:
  - name: Checkout
    uses: actions/checkout@v4

  - name: Setup Node
    uses: actions/setup-node@v4
    with:
      node-version: 22

  - name: Install dependencies
    run: npm ci

  - name: Build locally
    run: npm run build

  - name: Deploy to Server
    uses: appleboy/ssh-action@v1.2.0
    with:
      host: ${{ secrets.HOST }}
      username: ${{ secrets.USERNAME }}
      key: ${{ secrets.SSH_KEY }}
      port: ${{ secrets.PORT }}
      script: |
        cd ~/apps/nextFront-intelrain

        git fetch origin
        git reset --hard origin/main

        npm install

        npm run build

        pm2 restart nextFront || pm2 start npm --name nextFront -- start

        pm2 save
```
